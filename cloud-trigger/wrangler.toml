name = "ibk-fss-brief-trigger"
main = "src/index.js"
compatibility_date = "2026-06-25"

# 정시 발화 1회 — Cloudflare cron은 UTC 기준:
#   08:00 KST = 23:00 UTC(전날), 월~금  → 단일 슬롯(am)
# FSS 제재는 부정기 발행이라 하루 1회로 충분. FSC 브리핑(06:00/16:00)과 시각 분리(결정 B).
# 대시보드 실제 설정과 일치. (wrangler로는 스케줄 쓰기가 막혀 있어 대시보드에서 직접 추가/변경)
[triggers]
crons = ["0 23 * * 0-4"]

# GH_PAT 은 코드에 두지 말고 secret 으로:
#   wrangler secret put GH_PAT
