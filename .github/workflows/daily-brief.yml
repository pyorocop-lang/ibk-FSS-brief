name: IBK FSS Sanction Brief

# ─── 완전 클라우드 자동화 (로컬 PC 불필요) ───────────────────────────
# FSS가 해외 IP를 차단하지 않음이 검증됨(미국 러너 4종 접근 PASS, diag-fss-access.yml) →
# 크롤까지 GitHub Actions 한 Job에서 실행. 로컬 listener·trigger_bot 불요.
#
# 트리거: workflow_dispatch 단일 — 외부 Cloudflare Workers Cron이 08:00 KST에 호출.
#   (GitHub 자체 schedule cron은 ~12h 지연·누락이 확인되어 제거. 정시성은 Cloudflare가 책임.)
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fss-brief
  cancel-in-progress: false

jobs:
  brief:
    name: 제재 브리핑 (크롤+dedup → 분석 → 보고서 → 검증 → 알림)
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 크롤 잡 레벨 재시도(최대 3회) 여유 확보

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: 날짜 설정 (KST 기준)
        run: echo "TODAY=$(TZ=Asia/Seoul date +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 시작 알림 (Telegram)
        run: node notify_telegram.js --msg "⚙️ ${TODAY} 브리핑 생성 시작합니다."
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      # ── STEP 1: 크롤+dedup (클라우드 직접). FSS 2소스(제재공시·경영유의)를
      #    수집하고 state/seen_ids.json 대조로 신규만 추출. 실패(timeout/error)를
      #    "신규 없음"으로 오인 보고하지 않도록, crawl_result.json 의 error 필드가
      #    있으면 명시적 실패 알림 후 Job 중단(→ 완료 알림 대신 오류 알림) ──
      - name: STEP 1 크롤+dedup (fss_crawler.js)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          ATTEMPTS=3; GAP=120; ERR=""
          for n in $(seq 1 $ATTEMPTS); do
            echo "── 크롤 시도 $n/$ATTEMPTS ──"
            node fss_crawler.js --date "$TODAY"
            ERR=$(node -e "try{const d=require('./reports/${TODAY}/crawl_result.json');process.stdout.write(String(d.error||''))}catch(e){process.stdout.write('crawl_result_missing')}")
            if [ -z "$ERR" ]; then echo "크롤 성공 (시도 $n)"; break; fi
            echo "::warning::크롤 시도 $n/$ATTEMPTS 실패 — $ERR"
            [ "$n" -lt "$ATTEMPTS" ] && { echo "${GAP}초 후 재시도..."; sleep "$GAP"; }
          done
          if [ -n "$ERR" ]; then
            echo "::error::크롤 최종 실패 ($ATTEMPTS회 시도) — $ERR"
            node notify_telegram.js --msg "❌ ${TODAY} 크롤 실패 — FSS ${ATTEMPTS}회 시도 모두 timeout/error ($ERR). 데이터 미확인, 재실행 필요." || true
            exit 1
          fi
          echo "크롤 정상 — 후속 단계 진행"

      - name: STEP 2 Analyst (analyst.js)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          node analyst.js --date "$TODAY"
          EXIT=$?
          if [ $EXIT -eq 2 ]; then echo "::error::Analyst 치명 오류 (exitCode=2)"; exit 2; fi
          [ $EXIT -eq 1 ] && echo "::warning::Analyst fallback 모드 (API 키 미설정 또는 오류)"
          exit 0

      - name: STEP 3 보고서 생성 (briefV2.js)
        run: node briefV2.js --date "$TODAY"

      - name: STEP 4 검증 (validator.js)
        run: |
          set +e
          node validator.js --date "$TODAY"
          EXIT=$?
          [ $EXIT -eq 2 ] && echo "::warning::Validator 경고 — validation_result.json 확인 필요"
          exit 0

      - name: STEP 5 아카이브 (archivist.js)
        if: always()
        run: |
          STATUS="ok"
          [ "${{ job.status }}" != "success" ] && STATUS="error"
          node archivist.js --date "$TODAY" --status "$STATUS"
        continue-on-error: true

      # ── STEP 6: 감사 통합 추적 — 크롤원본·메타·매니페스트·dedup ledger git 커밋 ──
      #    state/seen_ids.json(영구 ledger)은 클라우드 실행의 유일한 상태 저장소이므로
      #    반드시 같은 커밋에 포함해 중복방지 상태를 지속한다.
      - name: STEP 6 감사 커밋 (crawl_result · run_meta · manifest · seen_ids)
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "reports/${TODAY}/crawl_result.json" "reports/${TODAY}/run_meta.json" logs/run_manifest.jsonl state/seen_ids.json || true
          if git diff --cached --quiet; then
            echo "커밋할 감사 변경 없음"
          else
            git commit -m "brief: ${TODAY} 클라우드 자동 실행 (크롤+dedup+분석+보고서)"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              echo "push 재시도 $i/3"; sleep 3
            done
          fi
        continue-on-error: true

      # 보고서 docx + PDF 원문(감사 증거)을 Artifact로 90일 보관
      - name: 보고서 Artifact 업로드
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: morning-brief-${{ env.TODAY }}
          path: reports/${{ env.TODAY }}/
          retention-days: 90
          if-no-files-found: warn

      - name: 완료 알림 (Telegram)
        if: success()
        run: node notify_telegram.js --from-crawl-result
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_DATE:        ${{ env.TODAY }}

      - name: 오류 알림 (Telegram)
        if: failure()
        run: node notify_telegram.js --msg "❌ 브리핑 오류 발생 (${TODAY}) — GitHub Actions 로그 확인 필요"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true
