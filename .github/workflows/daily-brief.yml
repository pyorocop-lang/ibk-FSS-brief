name: IBK FSS Sanction Brief

# ─── 완전 클라우드 자동화 (로컬 PC 불필요) ───────────────────────────
# 수집: FSS 제재공시(openInfo, HTML) + 경영유의·개선(openInfoImpr, PDF첨부) 2소스 스크래핑 + seen_ids dedup. 한 Job에서 실행.
# FSS는 해외 IP 차단 없음이 검증됨(미국 러너 4종 접근 PASS, diag-fss-access.yml) → KR 프록시 불요. 로컬 listener·trigger_bot 불요.
#
# 트리거: workflow_dispatch — 외부 Cloudflare Workers Cron이 08:00·16:00 KST에 호출(하루 2회, FSC 동형).
#   08:00=am / 16:00=pm. pm은 오전 이후 신규만 델타 알림.
#   (GitHub 자체 schedule cron은 ~12h 지연·누락이 확인되어 제거. 정시성은 Cloudflare가 책임.)
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fss-brief
  cancel-in-progress: false

jobs:
  brief:
    name: 제재 브리핑 (수집+dedup → 분석 → 보고서 → 검증 → 알림)
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 수집 잡 레벨 재시도(최대 3회) 여유 확보

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: 날짜·런슬롯 설정 (KST 기준)
        run: |
          echo "TODAY=$(TZ=Asia/Seoul date +%Y%m%d)" >> "$GITHUB_ENV"
          HOUR=$(TZ=Asia/Seoul date +%H)
          # 하루 2회 발화: 08:00 KST → am, 16:00 KST → pm (<12=am, ≥12=pm).
          #   pm은 오전 이후 신규만 델타 알림. 수동 재실행도 시각으로 슬롯 자동 분리.
          #   산출물은 reports/{날짜}/{슬롯}/ 에 런별 분리 보존(덮어쓰기 금지 — 감사 추적).
          if [ "$HOUR" -ge 12 ]; then SLOT=pm; else SLOT=am; fi
          echo "RUN_SLOT=$SLOT" >> "$GITHUB_ENV"
          echo "런 슬롯: $SLOT (KST ${HOUR}시) — 산출물 reports/${TODAY:-?}/$SLOT/ 분리 보존"

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: PRECHECK 조직 정본 사전검사
        run: |
          npm run org:validate
          npm run org:generate:check
          node org_tools.js audit --runtime

      - name: 시작 알림 (Telegram)
        run: node notify_telegram.js --msg "⚙️ ${TODAY} 브리핑 생성 시작합니다."
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      # ── STEP 1: 수집+dedup (FSS 2소스 스크래핑). 실패(timeout/error)를 "신규 없음"으로
      #    오인 보고하지 않도록, 실패 시 수집기는 failure_meta.json 만 쓰고 성공본(crawl_result.json)은
      #    건드리지 않는다 → 명시적 실패 알림 후 Job 중단(→ 완료 알림 대신 오류 알림) ──
      - name: STEP 1 수집+dedup (fss_crawler.js — 제재공시 HTML + 경영유의 PDF, seen_ids 대조)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          # FSS는 KR 프록시 미사용(해외 차단 없음 검증). 콜드스타트·일시장애 흡수용 재시도만 유지.
          ATTEMPTS=3; GAP=120; ERR=""
          FMETA="reports/${TODAY}/${RUN_SLOT}/failure_meta.json"
          rm -f "$FMETA"   # 이번 슬롯의 이전 run 실패기록 제거
          for n in $(seq 1 $ATTEMPTS); do
            echo "── 수집 시도 $n/$ATTEMPTS ──"
            rm -f "$FMETA"
            node fss_crawler.js --date "$TODAY"
            # 실패 격리: 수집기는 실패 시 failure_meta.json 만 쓰고 crawl_result.json(성공본)은 건드리지 않는다.
            #   failure_meta.json 존재 = 이번 시도 실패.
            ERR=$(node -e "try{const d=require('./reports/${TODAY}/${RUN_SLOT}/failure_meta.json');process.stdout.write(String(d.error||'failed'))}catch(e){process.stdout.write('')}")
            if [ -z "$ERR" ]; then echo "수집 성공 (시도 $n)"; break; fi
            echo "::warning::수집 시도 $n/$ATTEMPTS 실패 — $ERR"
            [ "$n" -lt "$ATTEMPTS" ] && { echo "${GAP}초 후 재시도..."; sleep "$GAP"; }
          done
          if [ -n "$ERR" ]; then
            echo "::error::수집 최종 실패 ($ATTEMPTS회 시도) — $ERR"
            node notify_telegram.js --msg "❌ ${TODAY} 수집 실패 — FSS 2소스 스크래핑 ${ATTEMPTS}회 시도 모두 실패 ($ERR). 데이터 미확인, 재실행 필요." || true
            exit 1
          fi
          echo "수집 정상 — 후속 단계 진행"

      - name: STEP 2 Analyst (analyst.js)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          node analyst.js --date "$TODAY"
          EXIT=$?
          if [ $EXIT -eq 2 ]; then echo "::error::Analyst 치명 오류 (exitCode=2)"; exit 2; fi
          [ $EXIT -eq 1 ] && echo "::warning::Analyst fallback 모드 (API 키 미설정 또는 오류)"
          exit 0

      - name: STEP 3 보고서 생성 (briefV2.js)
        run: node briefV2.js --date "$TODAY"

      - name: STEP 4 검증 (validator.js)
        run: |
          set +e
          node validator.js --date "$TODAY"
          EXIT=$?
          [ $EXIT -eq 2 ] && echo "::warning::Validator 경고 — validation_result.json 확인 필요"
          exit 0

      - name: STEP 5 아카이브 (archivist.js)
        if: always()
        run: |
          STATUS="ok"
          [ "${{ job.status }}" != "success" ] && STATUS="error"
          node archivist.js --date "$TODAY" --status "$STATUS"
        continue-on-error: true

      # ── STEP 6: 감사 통합 추적 — 수집원본·메타·매니페스트 git 커밋 ──
      - name: STEP 6 감사 커밋 (crawl_result · run_meta · manifest)
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 실패 결과 격리(Codex): 수집기는 실패 시 failure_meta.json 만 쓰고 crawl_result.json(성공본)은
          #   건드리지 않는다. 그 신호로 커밋 대상을 가른다 — 성공 데이터와 실패 로그를 분리.
          #   (배경: 20260627 timeout이 성공기록 6건을 0건으로 클로버 — f93e0c4. 이제 원천 차단.)
          git add -f logs/run_manifest.jsonl || true
          if [ -f "reports/${TODAY}/${RUN_SLOT}/failure_meta.json" ]; then
            # 실패: 성공파일(crawl_result·run_meta) 미커밋(기존 성공 보존), 실패기록만 격리 커밋
            git add -f "reports/${TODAY}/${RUN_SLOT}/failure_meta.json" || true
            echo "::warning::수집 실패($RUN_SLOT) — crawl_result/run_meta 미커밋(기존 성공 보존), failure_meta·manifest만 기록"
          else
            # 성공: 성공파일 커밋 + dedup ledger(state/seen_ids.json) 갱신 반영 + (이전에 남아있던) 실패기록 삭제 반영
            #   seen_ids.json은 클라우드 실행의 유일한 상태 저장소 → 성공 시에만 커밋해 중복방지 상태 지속.
            git add -f "reports/${TODAY}/${RUN_SLOT}/crawl_result.json" "reports/${TODAY}/${RUN_SLOT}/run_meta.json" state/seen_ids.json || true
            git add "reports/${TODAY}/${RUN_SLOT}/failure_meta.json" 2>/dev/null || true
          fi
          if git diff --cached --quiet; then
            echo "커밋할 감사 변경 없음"
          else
            git commit -m "brief: ${TODAY}/${RUN_SLOT} 클라우드 자동 실행 (수집+분석+보고서)"
            # -X theirs: 재실행 등으로 같은 날짜 파일이 add/add 충돌나면 현재 런(최신)을 채택해 자동 해소.
            #   (로컬 재현 검증: 현행 `--rebase`는 충돌마커→crawl_result.json 손상→완료알림 JSON.parse 실패.
            #    `-X theirs`는 rebase exit 0·유효 JSON·재실행 성공본 채택.)
            for i in 1 2 3; do
              if git pull --rebase --autostash -X theirs && git push; then break; fi
              # rebase가 해소 못 하고 중단됐으면 작업트리를 깨끗한 커밋 상태로 복구한다.
              #   → 손상 JSON이 완료알림·아티팩트로 새는 것을 차단(notify가 항상 유효 JSON을 읽음).
              git rebase --abort 2>/dev/null || true
              echo "push 재시도 $i/3"; sleep 3
            done
          fi
        continue-on-error: true

      # 보고서 docx + PDF 원문(감사 증거)을 Artifact로 90일 보관
      - name: 보고서 Artifact 업로드
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: fss-brief-${{ env.TODAY }}-${{ env.RUN_SLOT }}
          path: reports/${{ env.TODAY }}/${{ env.RUN_SLOT }}/
          retention-days: 90
          if-no-files-found: warn

      - name: 완료 알림 (Telegram)
        if: success()
        run: |
          # 하루 2회 발화(08:00 am / 16:00 pm). pm은 오전 대비 델타 게이트 적용:
          #   오전본(reports/{date}/am/crawl_result.json)이 있으면 --delta-since 로 '오전 이후 신규'만 전체 알림,
          #   신규 0건이면 '변동 없음' 마감 알림. am이거나 오전본이 없으면 평소대로 전체 tgMsg 전송(놓침 방지).
          AM_CRAWL="reports/${TODAY}/am/crawl_result.json"
          if [ "$RUN_SLOT" = "pm" ] && [ -f "$AM_CRAWL" ]; then
            node notify_telegram.js --from-crawl-result --delta-since "$AM_CRAWL"
          else
            node notify_telegram.js --from-crawl-result
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_DATE:        ${{ env.TODAY }}

      - name: 오류 알림 (Telegram)
        if: failure()
        run: node notify_telegram.js --msg "❌ 브리핑 오류 발생 (${TODAY}/${RUN_SLOT}) — GitHub Actions 로그 확인 필요"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true
